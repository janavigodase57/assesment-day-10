<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Ordering System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f5f5f5;
}

nav{
background:#ff5722;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

nav ul{
display:flex;
list-style:none;
gap:20px;
}

nav a{
text-decoration:none;
color:white;
font-weight:bold;
}

.hero{
height:300px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
background-size:cover;
color:white;
}

.hero h1{
font-size:45px;
}

.food-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.2);
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.card button{
background:#ff5722;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
margin-top:10px;
}

.cart{
padding:20px;
background:white;
margin:20px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.qty-btn{
padding:5px 10px;
background:#ff5722;
border:none;
color:white;
cursor:pointer;
}

.summary{
text-align:center;
padding:20px;
}

.payment-btn{
background:green;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:350px;
border-radius:10px;
text-align:center;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

</style>
</head>
<body>

<nav>
<h2>🍔 FoodieHub</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#foods">Order Foods</a></li>
<li><a href="#cart">Cart</a></li>
<li><a href="signup.html">Sign Up</a></li>
</ul>
</nav>

<section class="hero">
<h1>Order Delicious Food</h1>
<p>Fast Delivery | Best Taste</p>
</section>

<h2 style="text-align:center;margin-top:20px;">Our Menu</h2>

<div id="foods" class="food-container"></div>

<div id="cart" class="cart">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total">0</span></h3>

<button class="payment-btn" onclick="showSummary()">
Proceed To Payment
</button>
</div>

<div id="summary" class="summary"></div>

<div class="modal" id="foodModal">
<div class="modal-content">
<span class="close" onclick="closeModal()">❌</span>

<img id="modalImg" width="250">
<h2 id="modalName"></h2>
<p id="modalDesc"></p>
<h3 id="modalPrice"></h3>
<p id="modalRating"></p>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
